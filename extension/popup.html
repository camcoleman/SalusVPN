<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SalusVPN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup">

      <div class="header-wrap">
        <!-- Decorative Latin arch motif -->
        <svg class="arch-motif" viewBox="0 0 360 72" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" aria-hidden="true">
          <path d="M-10,72 C90,-12 270,-12 370,72" fill="none" stroke="#3a2e22" stroke-width="1.5"/>
          <path d="M24,72 C104,8 256,8 336,72"    fill="none" stroke="#3a2e22" stroke-width="0.75"/>
          <line x1="24"  y1="72" x2="24"  y2="46" stroke="#3a2e22" stroke-width="0.75"/>
          <line x1="336" y1="72" x2="336" y2="46" stroke="#3a2e22" stroke-width="0.75"/>
        </svg>

        <header class="header">
          <div class="brand">
            <svg class="logo-img" width="100" height="90" viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
              <polygon points="50,3 78,14 78,52 50,67 22,52 22,14" fill="#1e1508" stroke="#c9773a" stroke-width="1.3"/>
              <polygon points="50,9 72,18.5 72,47.5 50,57 28,47.5 28,18.5" fill="none" stroke="#c9773a" stroke-opacity="0.3" stroke-width="0.6"/>
              <line x1="22" y1="35" x2="78" y2="35" stroke="#c9773a" stroke-opacity="0.2" stroke-width="0.5"/>
              <line x1="50" y1="3"  x2="50" y2="67" stroke="#c9773a" stroke-opacity="0.2" stroke-width="0.5"/>
              <path d="M38,22 L50,15 L62,22 L62,48 L50,55 L38,48 Z" fill="none" stroke="#c9773a" stroke-width="1.3"/>
              <path d="M32,22 Q50,14 68,22" fill="none" stroke="#c9773a" stroke-opacity="0.27" stroke-width="0.6"/>
              <path d="M32,48 Q50,56 68,48" fill="none" stroke="#c9773a" stroke-opacity="0.27" stroke-width="0.6"/>
              <circle cx="50" cy="35" r="8" fill="none" stroke="#c9773a" stroke-width="0.7"/>
              <line x1="50" y1="27" x2="50" y2="24" stroke="#c9773a" stroke-width="1.1" stroke-linecap="round"/>
              <line x1="50" y1="43" x2="50" y2="46" stroke="#c9773a" stroke-width="1.1" stroke-linecap="round"/>
              <line x1="42" y1="35" x2="39" y2="35" stroke="#c9773a" stroke-width="1.1" stroke-linecap="round"/>
              <line x1="58" y1="35" x2="61" y2="35" stroke="#c9773a" stroke-width="1.1" stroke-linecap="round"/>
              <circle cx="50" cy="35" r="4.5" fill="#c9773a"/>
              <text x="50" y="84" text-anchor="middle" font-family="'Cinzel', serif" font-weight="900" font-size="18" fill="#c9773a" letter-spacing="4">SALUS</text>
            </svg>
          </div>

          <div class="header-actions">
            <div class="wallet-menu">
              <button id="wallet-button" class="btn btn--wallet">Connect Wallet</button>
              <span id="wallet-indicator" class="wallet-indicator" hidden>
                <span class="wallet-indicator-dot"></span>
                <span id="wallet-address" class="wallet-indicator-addr"></span>
              </span>
              <div id="wallet-picker" class="wallet-dropdown" hidden>
                <button type="button" class="wallet-option" data-wallet="Phantom">
                  <span class="wallet-option-icon">👻</span>
                  <span>Phantom</span>
                </button>
                <button type="button" class="wallet-option" data-wallet="MetaMask">
                  <span class="wallet-option-icon">🦊</span>
                  <span>MetaMask</span>
                </button>
                <button type="button" class="wallet-option" data-wallet="Solflare">
                  <span class="wallet-option-icon">🔥</span>
                  <span>Solflare</span>
                </button>
              </div>
            </div>
          </div>
        </header>
      </div>

      <section class="card status-card">
        <div class="status-row">
          <span id="status-relay" class="status-relay">No Relay Selected</span>
          <div class="session-actions">
            <button id="session-button" class="btn btn--primary">Start</button>
            <button id="end-session-button" class="btn btn--danger" hidden>End</button>
          </div>
        </div>
        <div class="metrics-grid">
          <div class="mstat">
            <span id="session-timer" class="mstat-val">00:00</span>
            <span class="mstat-lbl">Time</span>
          </div>
          <div class="mstat">
            <span id="session-live-cost" class="mstat-val">$0.00</span>
            <span class="mstat-lbl">Cost</span>
          </div>
          <div class="mstat">
            <span id="hero-trust" class="mstat-val">—</span>
            <span class="mstat-lbl">Trust</span>
          </div>
          <div class="mstat">
            <span id="hero-latency" class="mstat-val">—</span>
            <span class="mstat-lbl">Latency</span>
          </div>
        </div>
        <div id="ip-display" class="ip-display ip-display--exposed">
          <div class="ip-display-head">
            <svg class="ip-display-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
              <line x1="12" y1="9" x2="12" y2="13"/>
              <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
            <span id="ip-display-label" class="ip-display-label">Your IP (Exposed)</span>
            <span id="ip-display-dot" class="ip-display-dot"></span>
          </div>
          <span id="ip-display-value" class="ip-display-value">192.168.1.47</span>
        </div>
        <div id="bots-blocked" class="bots-blocked" hidden>
          <div class="bots-blocked-head">
            <svg class="bots-blocked-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M9 12l2 2 4-4"/>
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            <span class="bots-blocked-label">Bots Blocked</span>
            <span class="bots-blocked-dot"></span>
          </div>
          <span id="bots-blocked-value" class="bots-blocked-value">0</span>
        </div>
        <p id="selected-details" class="detail-line">Select a relay to view verification details.</p>
      </section>

      <section class="card advisor-card">
        <div class="card-head">
          <span class="section-label">AI Trust Advisor</span>
          <span class="tag tag--ai">Instant</span>
        </div>
        <div id="advisor-options" class="advisor-options">
          <button type="button" class="advisor-opt" data-pref="best-overall">Best Overall</button>
          <button type="button" class="advisor-opt" data-pref="lowest-cost">Lowest Cost</button>
          <button type="button" class="advisor-opt" data-pref="lowest-latency">Lowest Latency</button>
          <button type="button" class="advisor-opt" data-pref="highest-trust">Highest Trust</button>
          <button type="button" class="advisor-opt" data-pref="streaming">Streaming</button>
          <button type="button" class="advisor-opt" data-pref="general-browsing">General Browsing</button>
        </div>
        <div id="advisor-result" class="advisor-result" hidden>
          <div class="advisor-result-row">
            <span id="advisor-node" class="advisor-node">—</span>
            <span id="advisor-score" class="trust-val">--</span>
            <button id="advisor-use" class="btn btn--ghost btn--sm">Use This Node</button>
          </div>
          <p id="advisor-reason" class="detail-line"></p>
        </div>
      </section>

      <section class="card relays-card">
        <div class="card-head">
          <span class="section-label">Relays</span>
          <span class="tag tag--live">Live</span>
        </div>
        <div id="nodes-list"></div>
      </section>

      <section class="card pending-card" id="pending-card">
        <div class="card-head">
          <span class="section-label">Pending payments</span>
          <span id="pending-count-badge" class="tag tag--live">0</span>
        </div>
        <p id="pending-summary" class="detail-line dim">No unpaid sessions.</p>
        <div id="pending-list" class="pending-list"></div>
        <button id="settle-all-button" class="btn btn--primary btn--sm pending-settle-btn" style="display:none">
          Settle all
        </button>
        <p id="pending-error" class="detail-line dim pending-error" style="display:none"></p>
        <div class="auto-settle-row">
          <label class="auto-settle-label">
            <input type="checkbox" id="auto-settle-enabled" />
            Auto-settle when queue reaches
          </label>
          <input
            type="number"
            id="auto-settle-threshold"
            class="auto-settle-threshold"
            min="1"
            max="20"
            value="5"
          />
          <span class="auto-settle-suffix">sessions</span>
        </div>
      </section>

      <div class="settlement-info">
        <p id="settlement-message" class="detail-line dim" style="display:none"></p>
        <p id="settlement-tx-row" class="detail-line dim settlement-tx-row" style="display:none">
          Tx: <a id="settlement-tx-link" href="#" target="_blank" rel="noopener noreferrer"></a>
        </p>
        <button id="settle-retry-button" class="btn btn--ghost btn--sm" style="display:none; margin-top:8px; width:100%">
          Retry settlement
        </button>
        <button id="settle-dashboard-button" class="btn btn--ghost btn--sm" style="display:none; margin-top:8px; width:100%">
          Settle on dashboard (fallback)
        </button>
      </div>

      <!-- Hidden wallet status placeholders: the WALLET card was removed, but
           the connection logic still writes to these nodes. The parent stays
           display:none so nothing renders regardless of inline style changes. -->
      <div style="display:none" aria-hidden="true">
        <p id="wallet-status"></p>
        <p id="wallet-name"></p>
        <p id="wallet-balance"></p>
        <p id="wallet-hint"></p>
      </div>

      <span id="session-node"       style="display:none"></span>
      <span id="session-cost"       style="display:none"></span>
      <span id="session-bot-risk"   style="display:none"></span>
      <span id="session-human-lane" style="display:none"></span>
      <span id="footer-cost"        style="display:none"></span>
    </div>

    <script src="config.js"></script>
    <script src="settlement.js"></script>
    <script src="relayNodes.js"></script>
    <script src="session.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
