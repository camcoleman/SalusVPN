<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SalusVPN</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup">

      <header class="header">
        <span class="wordmark">SalusVPN</span>
        <div class="header-right">
          <span id="connect-pill" class="status-pill disconnected">
            <span class="pulse-dot"></span>
            <span id="status-text">Disconnected</span>
          </span>
          <button id="session-button" class="btn btn-primary">Start</button>
        </div>
      </header>

      <div class="divider"></div>

      <div class="metrics-strip">
        <div class="metric">
          <span id="session-timer" class="metric-val">00:00</span>
          <span class="metric-lbl">Time</span>
        </div>
        <div class="metric">
          <span id="session-live-cost" class="metric-val">$0.00</span>
          <span class="metric-lbl">Cost</span>
        </div>
        <div class="metric">
          <span id="hero-trust" class="metric-val">--</span>
          <span class="metric-lbl">Trust</span>
        </div>
        <div class="metric">
          <span id="hero-latency" class="metric-val">--</span>
          <span class="metric-lbl">Latency</span>
        </div>
      </div>
      <p id="selected-details" class="detail-line">Select a relay to view verification details.</p>

      <div class="divider"></div>

      <div class="gemini-section">
        <div class="gemini-row">
          <span class="section-label">Gemini</span>
          <div class="gemini-content">
            <span id="recommended-node" class="gemini-node">—</span>
            <span id="recommended-score" class="trust-val">--</span>
            <span id="recommended-latency" class="muted">--</span>
          </div>
          <span id="recommended-badge" style="display:none"></span>
          <button id="use-recommendation" class="btn btn-ghost">Use</button>
        </div>
        <p id="recommended-reason" class="detail-line">Finding best relay…</p>
      </div>

      <div class="divider"></div>

      <div class="relay-section">
        <div class="relay-header">
          <span class="section-label">Relays</span>
          <span class="badge-live">Live</span>
        </div>
        <div id="nodes-list"></div>
      </div>

      <div class="divider"></div>

      <footer class="footer">
        <div class="wallet-area">
          <span class="section-label">Phantom</span>
          <span id="wallet-status" class="muted">Disconnected</span>
        </div>
        <div class="footer-actions">
          <button id="wallet-button" class="btn btn-ghost">Connect</button>
          <button id="end-session-button" class="btn btn-danger" disabled>End session</button>
        </div>
      </footer>

      <!-- State elements used by popup.js, not shown directly -->
      <span id="session-node" style="display:none"></span>
      <span id="session-cost" style="display:none"></span>
      <span id="session-bot-risk" style="display:none"></span>
      <span id="session-human-lane" style="display:none"></span>
      <span id="footer-cost" style="display:none"></span>
    </div>

    <script src="relayNodes.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
