<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SalusVPN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup">

      <div class="header-wrap">
        <!-- Decorative Latin arch motif -->
        <svg class="arch-motif" viewBox="0 0 360 72" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" aria-hidden="true">
          <path d="M-10,72 C90,-12 270,-12 370,72" fill="none" stroke="#3a2e22" stroke-width="1.5"/>
          <path d="M24,72 C104,8 256,8 336,72"    fill="none" stroke="#3a2e22" stroke-width="0.75"/>
          <line x1="24"  y1="72" x2="24"  y2="46" stroke="#3a2e22" stroke-width="0.75"/>
          <line x1="336" y1="72" x2="336" y2="46" stroke="#3a2e22" stroke-width="0.75"/>
        </svg>

        <header class="header">
          <div class="brand">
            <!-- Hexagonal shield mark -->
            <svg class="shield-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <polygon points="10,1.5 17.8,5.5 17.8,14.5 10,18.5 2.2,14.5 2.2,5.5" stroke="#c9773a" stroke-width="1.2" fill="rgba(201,119,58,0.15)"/>
              <path d="M13 8.5L8.8 12.7L7 10.9" stroke="#c9773a" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="wordmark">SALUS</span>
          </div>

          <span id="connect-pill" class="status-pill pill--off">
            <span class="pulse-dot"></span>
            <span id="status-text">Disconnected</span>
          </span>
        </header>
      </div>

      <section class="card status-card">
        <div class="status-row">
          <span id="status-relay" class="status-relay">No Relay Selected</span>
          <button id="session-button" class="btn btn--primary">Start</button>
        </div>
        <div class="metrics-grid">
          <div class="mstat">
            <span id="session-timer" class="mstat-val">00:00</span>
            <span class="mstat-lbl">Time</span>
          </div>
          <div class="mstat">
            <span id="session-live-cost" class="mstat-val">$0.00</span>
            <span class="mstat-lbl">Cost</span>
          </div>
          <div class="mstat">
            <span id="hero-trust" class="mstat-val">—</span>
            <span class="mstat-lbl">Trust</span>
          </div>
          <div class="mstat">
            <span id="hero-latency" class="mstat-val">—</span>
            <span class="mstat-lbl">Latency</span>
          </div>
        </div>
        <p id="selected-details" class="detail-line">Select a relay to view verification details.</p>
      </section>

      <section class="card gemini-card">
        <div class="card-head">
          <span class="section-label">Gemini</span>
          <span id="recommended-badge" class="tag tag--ai">AI Pick</span>
        </div>
        <div class="gemini-row">
          <span id="recommended-node" class="gemini-node">—</span>
          <span id="recommended-score" class="trust-val">--</span>
          <span id="recommended-latency" class="dim">--</span>
          <button id="use-recommendation" class="btn btn--ghost btn--sm">Use</button>
        </div>
        <p id="recommended-reason" class="detail-line">Finding best relay…</p>
      </section>

      <section class="card relays-card">
        <div class="card-head">
          <span class="section-label">Relays</span>
          <span class="tag tag--live">Live</span>
        </div>
        <div id="nodes-list"></div>
      </section>

      <section class="card wallet-card">
        <div class="wallet-row">
          <div>
            <span class="section-label">Wallet</span>
            <p id="wallet-status" class="detail-line">Not connected</p>
            <p id="wallet-name" class="detail-line dim" style="display:none"></p>
          </div>
          <div class="wallet-actions">
            <button id="wallet-button" class="btn btn--ghost">Open Dashboard</button>
            <button id="end-session-button" class="btn btn--danger" disabled>End</button>
          </div>
        </div>
        <p id="wallet-hint" class="detail-line dim">Connect wallet on the dashboard to start a session.</p>
        <p id="settlement-message" class="detail-line dim" style="display:none"></p>
        <button id="settle-dashboard-button" class="btn btn--ghost btn--sm" style="display:none; margin-top:8px; width:100%">
          Complete settlement on dashboard
        </button>
      </section>

      <span id="session-node"       style="display:none"></span>
      <span id="session-cost"       style="display:none"></span>
      <span id="session-bot-risk"   style="display:none"></span>
      <span id="session-human-lane" style="display:none"></span>
      <span id="footer-cost"        style="display:none"></span>
    </div>

    <script src="config.js"></script>
    <script src="relayNodes.js"></script>
    <script src="session.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
