<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SalusVPN</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup">

      <header class="header">
        <span class="wordmark">Salus<em>VPN</em></span>
        <span id="connect-pill" class="status-pill pill--off">
          <span class="pulse-dot"></span>
          <span id="status-text">Disconnected</span>
        </span>
      </header>

      <section class="card status-card">
        <div class="status-row">
          <span id="status-relay" class="status-relay">No relay selected</span>
          <button id="session-button" class="btn btn--primary">Start</button>
        </div>
        <div class="metrics-grid">
          <div class="mstat">
            <span id="session-timer" class="mstat-val">00:00</span>
            <span class="mstat-lbl">Time</span>
          </div>
          <div class="mstat">
            <span id="session-live-cost" class="mstat-val">$0.00</span>
            <span class="mstat-lbl">Cost</span>
          </div>
          <div class="mstat">
            <span id="hero-trust" class="mstat-val">—</span>
            <span class="mstat-lbl">Trust</span>
          </div>
          <div class="mstat">
            <span id="hero-latency" class="mstat-val">—</span>
            <span class="mstat-lbl">Latency</span>
          </div>
        </div>
        <p id="selected-details" class="detail-line">Select a relay to view verification details.</p>
      </section>

      <section class="card gemini-card">
        <div class="card-head">
          <span class="section-label">Gemini</span>
          <span id="recommended-badge" class="tag tag--ai">AI Pick</span>
        </div>
        <div class="gemini-row">
          <span id="recommended-node" class="gemini-node">—</span>
          <span id="recommended-score" class="trust-val">--</span>
          <span id="recommended-latency" class="dim">--</span>
          <button id="use-recommendation" class="btn btn--ghost btn--sm">Use</button>
        </div>
        <p id="recommended-reason" class="detail-line">Finding best relay…</p>
      </section>

      <section class="card relays-card">
        <div class="card-head">
          <span class="section-label">Relays</span>
          <span class="tag tag--live">Live</span>
        </div>
        <div id="nodes-list"></div>
      </section>

      <section class="card wallet-card">
        <div class="wallet-row">
          <div>
            <span class="section-label">Phantom</span>
            <p id="wallet-status" class="detail-line">Disconnected</p>
          </div>
          <div class="wallet-actions">
            <button id="wallet-button" class="btn btn--ghost">Connect</button>
            <button id="end-session-button" class="btn btn--danger" disabled>End</button>
          </div>
        </div>
      </section>

      <span id="session-node"     style="display:none"></span>
      <span id="session-cost"     style="display:none"></span>
      <span id="session-bot-risk" style="display:none"></span>
      <span id="session-human-lane" style="display:none"></span>
      <span id="footer-cost"      style="display:none"></span>
    </div>

    <script src="relayNodes.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
